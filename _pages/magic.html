<style>
.magic-container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 60vh;
  text-align: center;
  font-family: 'Inter', 'Helvetica Neue', sans-serif;
  margin-top: 40px;
}
.magic-text {
  font-size: 1.6rem;
  margin-bottom: 50px;
  color: var(--global-text-color);
  max-width: 700px;
  line-height: 1.6;
  opacity: 1;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.magic-btn {
  padding: 14px 32px;
  font-size: 1.25rem;
  font-weight: 600;
  background-color: var(--global-link-color);
  color: var(--global-bg-color);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  outline: none;
}
.magic-btn:hover {
  filter: brightness(1.1);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
.magic-btn:active {
  transform: translateY(1px);
}
.hidden {
  opacity: 0 !important;
  transform: translateY(15px);
  pointer-events: none;
}
</style>

<div class="magic-container">
  <div class="magic-text" id="magicText">Hi reviewer !!</div>
  <button class="magic-btn" id="magicBtn" onclick="nextStep()">Hii</button>
</div>

<script>
const steps = [
  { text: "Hi reviewer !!", btn: "Hii" },
  { text: "How is the weather in Vermont today?<br><br>Did you realize that you've been staring at the screen for idk <i>howww</i> long?", btn: "oh ya uff" },
  { text: "First of all, take a break cause you have reviewed a lot of applications until now.", btn: "UMMmm" },
  { text: "This is a reminder to take a 10 min break and drink water, coffee, or maybe go on a walk.", btn: "OKAYY !!" },
  { text: "Reviewing applications is tough—especially when the pool is so competitive as well as filled with a lot of slop.<br><br>I hope this break will help you give the same effort as you were giving to the applications in the beginning. Have a good day!<br><br><i>This is a special version of my site just for you cause you are so busy. I'll redirect you straight to my timeline, but you can scroll up whenever you want to know more about my personality.</i>", btn: "okayyy" }
];

let currentStep = 0;

function nextStep() {
  currentStep++;
  const textEl = document.getElementById('magicText');
  const btnEl = document.getElementById('magicBtn');

  if (currentStep >= steps.length) {
    // Redirect to the timeline section of the homepage!
    window.location.href = "/#my-timeline";
    return;
  }

  // Fade out
  textEl.classList.add('hidden');
  btnEl.classList.add('hidden');

  setTimeout(() => {
    // Update content sequentially
    textEl.innerHTML = steps[currentStep].text;
    btnEl.innerHTML = steps[currentStep].btn;
    
    // Fade in
    textEl.classList.remove('hidden');
    btnEl.classList.remove('hidden');
  }, 400); // Waits for the 0.4s CSS fade-out transition
}
</script>
